version: '3.8'

services:
  lapdev:
    build:
      context: .
      dockerfile: Dockerfile
    image: lapdev:latest
    container_name: lapdev
    ports:
      - "${HOST_FRONTEND_PORT:-8080}:${FRONTEND_PROD_PORT:-8080}"
      - "${HOST_BACKEND_PORT:-3333}:${CONTAINER_PORT:-3333}"
    volumes:
      - ./workspace:/workspace
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - NODE_ENV=production
      - WORKSPACE_PATH=/workspace
      - PORT=${BACKEND_PORT:-3333}
      - DENO_PORT=${BACKEND_PORT:-3333}
    networks:
      - lapdev-network
    restart: unless-stopped

networks:
  lapdev-network:
    driver: bridge

volumes:
  workspace:
    driver: local