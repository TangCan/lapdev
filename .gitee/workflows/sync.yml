name: Sync to GitHub Mirror

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Mirror to GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configure Git user
        run: |
          git config user.name "Gitee CI"
          git config user.email "ci@gitee.com"
          
      - name: Add GitHub remote
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add github https://${GITHUB_TOKEN}@github.com/lapdev/lapdev.git
          
      - name: Push to GitHub
        run: |
          git push github main --tags --force-with-lease