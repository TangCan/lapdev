name: Lapdev CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.42.0
          
      - name: Run unit tests
        run: deno test --allow-read --allow-write --allow-env frontend/tests/unit/
        
      - name: Run acceptance tests
        run: deno test --allow-read --allow-write --allow-env tests/acceptance/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Gitee Registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitee.com
          username: ${{ secrets.GITEE_USERNAME }}
          password: ${{ secrets.GITEE_PASSWORD }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.gitee.com/lapdev/lapdev:latest

  sync:
    name: Sync to GitHub
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Push to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add github https://${{ secrets.GITHUB_TOKEN }}@github.com/lapdev/lapdev.git
          git push github main --force-with-lease